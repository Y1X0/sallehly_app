name: sallehly_app
description: "Sallehly Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: ^5.9.2
  provider: ^6.1.5+1

  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1

  socket_io_client: ^3.1.6

  image_picker: ^1.2.2
  file_picker: ^8.1.7

  geolocator: ^13.0.1
  url_launcher: ^6.3.2

  intl: ^0.20.2

  record: ^6.1.2
  audioplayers: ^6.1.0

  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

# إعدادات أيقونة التطبيق
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  # خلفية الأيقونة على أندرويد الحديث (adaptive icon)
  adaptive_icon_background: "#0A0E29"
  adaptive_icon_foreground: "assets/icons/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/