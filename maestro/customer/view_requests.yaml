# Customer: open "My Requests" and confirm the list screen actually loads.
#
# Selectors verified directly against source:
#   - lib/features/customer/screens/customer_dashboard_screen.dart:113
#     "طلباتي" action card -> opens CustomerRequestsScreen
#   - lib/features/customer/screens/customer_requests_screen.dart:92-105:
#     the destination screen's ListView puts a _SummaryCard BEFORE the
#     "طلباتي" / "تابع حالة الطلبات والعروض" SectionTitle, which can push
#     it below the fold — confirmed root cause of run 29562329149's
#     failure (same class of bug as technician/view_jobs.yaml).
#     scrollUntilVisible instead of assertVisible/extendedWaitUntil,
#     since those don't auto-scroll.
#
# Required env vars: QA_EMAIL, QA_PASSWORD (same seeded customer account).
appId: com.sallehly.app
---
- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 20000
- tapOn: "تسجيل الدخول"
- assertVisible: "البريد الإلكتروني"
- tapOn: "البريد الإلكتروني"
- inputText: "${QA_EMAIL}"
- tapOn: "كلمة المرور"
- inputText: "${QA_PASSWORD}"
- tapOn: "تسجيل الدخول"
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 20000

- tapOn: "طلباتي"
- scrollUntilVisible:
    element: "تابع حالة الطلبات والعروض"
    direction: DOWN
    timeout: 20000
