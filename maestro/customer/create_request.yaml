# Customer: create a maintenance request end-to-end.
#
# Selectors verified directly against source, not guessed:
#   - lib/features/customer/screens/customer_dashboard_screen.dart:104
#     "إنشاء طلب" action card -> opens CreateRequestScreen
#   - lib/features/customer/screens/create_request_screen.dart:137/147/163/
#     179/195/206/244 for the screen title, field labels, and submit button
#   - "كهربائي" is guaranteed to exist as a real service_categories row —
#     seeded unconditionally in config/migrate.js:310-312, independent of
#     any test-only branch, so this is safe against any freshly-migrated
#     backend, not just the CI test one.
#   - "عمّان" / "القويسمة" are the first city/area entries in
#     lib/core/utils/app_constants.dart, always present, no live-data
#     dependency.
#
# Least-proven part of this flow: the three DropdownButtonFormField
# selections (service/city/area). Every other step here reuses the exact
# tap/input pattern already validated by real CI runs of the smoke test.
# If this flow fails specifically at one of the three `tapOn` calls right
# after a dropdown label, that's the first thing to check.
#
# Required env vars: QA_EMAIL, QA_PASSWORD (same seeded customer account).
appId: com.sallehly.app
---
- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 20000
- tapOn: "تسجيل الدخول"
- assertVisible: "البريد الإلكتروني"
- tapOn: "البريد الإلكتروني"
- inputText: "${QA_EMAIL}"
- tapOn: "كلمة المرور"
- inputText: "${QA_PASSWORD}"
- tapOn: "تسجيل الدخول"
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 20000

# Dashboard -> "إنشاء طلب" action card -> create-request form.
#
# Run 29602424550 screenshot evidence: "إنشاء طلب" is clearly, visibly
# rendered on screen at the exact moment Maestro reports the assertion
# as still false after the full 60s timeout — this is not a rendering,
# navigation, or timing problem; the element is genuinely on screen
# and Maestro's own detection is not seeing it. See the ~180-word
# report accompanying this commit for the full cross-flow evidence.
#
# EXPERIMENTAL — not a fix. Testing whether inserting one cheap,
# state-neutral query (re-checking "الرئيسية", already proven to
# resolve in ~2s every run, so this adds no real wait under normal
# conditions) immediately before the "إنشاء طلب" check changes the
# outcome. If "إنشاء طلب" now passes, the failure is sequencing/
# caching-sensitive, not a hard detection limit. If it still fails,
# Maestro's accessibility tree genuinely never exposes this element,
# regardless of what precedes it. This step is temporary and will be
# removed once the experiment's result is known.
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 5000
- extendedWaitUntil:
    visible: "إنشاء طلب"
    timeout: 60000
- tapOn: "إنشاء طلب"
- assertVisible: "طلب صيانة جديد"

# Service dropdown.
- tapOn: "الخدمة / المهنة"
- tapOn: "كهربائي"

# City dropdown.
- tapOn: "المحافظة"
- tapOn: "عمّان"

# Area dropdown (options only populate after a city is picked).
- tapOn: "المنطقة"
- tapOn: "القويسمة"

# Description — validator requires at least 10 characters.
- tapOn: "وصف المشكلة"
- inputText: "يوجد عطل كهربائي في المطبخ ويحتاج فني بسرعة"

- tapOn: "نشر الطلب واستقبال العروض"

# Success snackbar text from create_request_screen.dart:91.
- extendedWaitUntil:
    visible: "تم إنشاء الطلب بنجاح"
    timeout: 15000
