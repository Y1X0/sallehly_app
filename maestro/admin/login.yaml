# Admin login — uses the fixed test-mode admin default that
# config/migrate.js:325-327 creates whenever NODE_ENV=test (which is
# exactly how the CI backend boots — see .github/workflows/qa-e2e.yml's
# "Boot test backend" step): admin-test@example.com / AdminTestPass123.
# No extra seed step is needed for this account to exist; it's a fixed,
# non-secret, source-committed test default, not something CI creates.
appId: com.sallehly.app
---
- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 20000
- tapOn: "تسجيل الدخول"
- assertVisible: "البريد الإلكتروني"
- tapOn: "البريد الإلكتروني"
- inputText: "admin-test@example.com"
- tapOn: "كلمة المرور"
- inputText: "AdminTestPass123"
- tapOn: "تسجيل الدخول"

# Admin home screen — "الرئيسية" is the first bottom-nav tab label
# (lib/features/layout/admin_layout.dart:159).
#
# Timeout raised again, 90s -> 240s, based on the run 29565568559
# screenshot (screenshot-❌-...-(login).png): the captured failure
# frame shows a fully loaded, fully functional Admin Dashboard with
# real data (5 فنيين, 1 عملاء) and "الرئيسية" clearly visible and
# selected in the bottom nav — login succeeds and the correct screen
# renders correctly every time, it just consistently takes longer
# than 90s in this CI/emulator environment (worst observed: 212s in
# that same run, up from 146s two runs earlier — still climbing, not
# settling). This is a confirmed timing issue, not a wrong selector.
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 240000
