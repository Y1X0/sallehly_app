# Smoke test: launch the app, log in as a pre-seeded customer, verify the
# customer home screen actually loads. This is the single "is the app alive
# at all" gate — see maestro/README.md for how CI seeds the account.
#
# Required env vars (pass via `maestro test ... -e KEY=value`):
#   QA_EMAIL     — email of a real, already-registered customer account
#   QA_PASSWORD  — that account's password
appId: com.sallehly.app
---
# permissions: { all: allow } pre-grants every Android runtime permission
# (including POST_NOTIFICATIONS on API 33+) before the app process starts.
# Without this, main.dart's FirebaseNotificationService.init() awaits a
# permission-request call that shows a native OS dialog on first launch,
# blocking runApp() (and therefore the whole Flutter UI, including this
# screen's own text) from ever rendering — confirmed root cause of the
# previous run's failure ("تسجيل الدخول" never became visible within the
# assertion timeout). This is a test-infrastructure-only change; it does
# not alter any app code or runtime behavior on a real user's device.
- launchApp:
    clearState: true
    permissions:
      all: allow

# Landing screen — tap through to the login form. Uses extendedWaitUntil,
# not a bare assertVisible, for the same reason as the post-login
# assertion below: under real CI/emulator load (confirmed by run
# 29557990817, where every flow in a batched run failed here despite
# this exact step passing in an earlier isolated run) a fresh cold
# launch can take longer than assertVisible's default timeout allows.
- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 20000
- tapOn: "تسجيل الدخول"

# Login form.
- assertVisible: "البريد الإلكتروني"
- tapOn: "البريد الإلكتروني"
- inputText: "${QA_EMAIL}"
- tapOn: "كلمة المرور"
- inputText: "${QA_PASSWORD}"
- tapOn: "تسجيل الدخول"

# Customer home screen — "الرئيسية" is the first bottom-nav tab label,
# only present once a real, authenticated home screen has rendered.
# assertVisible does not support a "timeout" property; extendedWaitUntil
# is Maestro's supported command for a custom wait timeout.
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 20000
