# Technician: confirm the "browse jobs" feed loads.
#
# CORRECTED after real screenshot evidence (run 29565568559,
# screenshot-❌-...-(view_jobs).png): the technician's home tab
# ("الرئيسية") is NOT NewRequestsScreen directly — it's a separate
# TechnicianDashboardScreen (رصيد، زر "عرض الطلبات الجديدة"،
# اختصارات الفني). "طلبات العملاء" was never on that screen at all,
# which is why neither the earlier extendedWaitUntil nor
# scrollUntilVisible fix could ever find it — no amount of
# waiting/scrolling puts text on a screen it was never part of.
#
# Confirmed via source, not guessed:
#   - lib/features/layout/technician_layout.dart:31-38: pages[0] is
#     TechnicianDashboardScreen(), pages[1] is NewRequestsScreen().
#   - lib/features/layout/technician_layout.dart:141-146: the nav item
#     at index 1 is labeled "جديدة" — exactly matching the bottom nav
#     in the screenshot. Tapping it selects pages[1] = NewRequestsScreen.
#   - lib/features/technician/screens/new_requests_screen.dart:52: once
#     actually on that screen, "طلبات العملاء" is the SectionTitle,
#     rendered unconditionally regardless of loading/empty/populated
#     state.
appId: com.sallehly.app
---
- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 20000
- tapOn: "تسجيل الدخول"
- assertVisible: "البريد الإلكتروني"
- tapOn: "البريد الإلكتروني"
- inputText: "tech.elec.amman@sallehly.jo"
- tapOn: "كلمة المرور"
- inputText: "Tech@12345"
- tapOn: "تسجيل الدخول"
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 20000

# Navigate from the technician dashboard to the actual jobs feed via
# the "جديدة" bottom-nav tab (index 1 -> NewRequestsScreen).
- tapOn: "جديدة"
- extendedWaitUntil:
    visible: "طلبات العملاء"
    timeout: 20000
