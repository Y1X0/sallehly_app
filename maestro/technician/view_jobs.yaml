# Technician: confirm the "browse jobs" feed loads. This is already the
# technician's default landing tab — no extra navigation tap needed.
#
# Selectors verified directly against source:
#   - lib/features/layout/technician_layout.dart:33 puts NewRequestsScreen
#     at index 0, matching the "الرئيسية" nav tab at line 140 — so it's
#     the screen already showing right after login.
#   - lib/features/technician/screens/new_requests_screen.dart:36-54: the
#     screen body is a ListView whose FIRST child is a large _HeroCard
#     (padding 22, 130px icon, multi-line text), with the "طلبات العملاء"
#     SectionTitle only appearing AFTER it. On the emulator's screen size
#     that pushes the title below the fold — confirmed root cause of run
#     29562329149's failure (a 20s extendedWaitUntil still couldn't find
#     it: it's off-screen, not slow to render, and Maestro's
#     assertVisible/extendedWaitUntil don't auto-scroll). scrollUntilVisible
#     is the correct Maestro command for an element that requires scrolling.
appId: com.sallehly.app
---
- launchApp:
    clearState: true
    permissions:
      all: allow

- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 20000
- tapOn: "تسجيل الدخول"
- assertVisible: "البريد الإلكتروني"
- tapOn: "البريد الإلكتروني"
- inputText: "tech.elec.amman@sallehly.jo"
- tapOn: "كلمة المرور"
- inputText: "Tech@12345"
- tapOn: "تسجيل الدخول"
- extendedWaitUntil:
    visible: "الرئيسية"
    timeout: 20000

- scrollUntilVisible:
    element: "طلبات العملاء"
    direction: DOWN
    timeout: 20000
