workflows:
  ios-test-build:
    name: iOS - بناء تجريبي (بدون توقيع)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: تثبيت الحزم
        script: |
          flutter pub get
      - name: بناء iOS بدون توقيع (للتأكد إن الكود يترجم صح فقط)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - yy625540@gmail.com
        notify:
          success: true
          failure: true
