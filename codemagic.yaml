workflows:
  ios-screenshot-preview:
    name: iOS - صور شاشة للتطبيق (بدون أي برنامج إضافي منك)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: تثبيت الحزم
        script: |
          flutter pub get
      - name: بناء نسخة محاكي (Simulator)
        script: |
          flutter build ios --debug --no-codesign --simulator
      - name: تشغيل التطبيق وأخذ صور شاشة تلقائياً
        script: |
          open -a Simulator
          DEVICE_ID=$(xcrun simctl list devices available | grep -m 1 "iPhone" | grep -oE '[A-F0-9-]{36}')
          echo "جهاز المحاكاة: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 15

          xcrun simctl install "$DEVICE_ID" build/ios/iphonesimulator/Runner.app
          xcrun simctl launch "$DEVICE_ID" com.example.sallehlyApp

          mkdir -p screenshots
          # ننتظر شوي بعد كل خطوة ونلتقط صورة -- هيك بناخذ شاشات متتالية
          # وهي شاشة البداية / السبلاش على الأغلب بما إنه ما في تفاعل تلقائي
          sleep 5
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/01_launch.png
          sleep 5
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/02_after_5s.png
          sleep 5
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/03_after_10s.png
          sleep 10
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/04_after_20s.png

          echo "تم أخذ الصور -- راجع قسم Artifacts بصفحة البناء"
    artifacts:
      - screenshots/*.png
    publishing:
      email:
        recipients:
          - yy625540@gmail.com
        notify:
          success: true
          failure: true
