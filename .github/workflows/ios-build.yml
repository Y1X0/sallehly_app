name: Build iOS (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Prepare iOS build settings
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig

      - name: Build iOS unsigned
        run: |
          cd ios

          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

          cd ..

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa_payload/Payload

          cp -r ios/build/Release-iphoneos/Runner.app \
          build/ios/ipa_payload/Payload/

          cd build/ios/ipa_payload

          zip -r ../../../sallehly_app.ipa Payload

          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sallehly-ios-ipa
          path: sallehly_app.ipa
          retention-days: 14