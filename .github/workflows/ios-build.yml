name: Build iOS (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist

      - name: Disable iOS signing
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM=" >> ios/Flutter/Release.xcconfig

      - name: Build iOS unsigned
        run: |
          flutter build ios \
            --release \
            --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa_payload/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa_payload/Payload/
          cd build/ios/ipa_payload
          zip -r ../../../sallehly_app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: sallehly-ios-ipa
          path: sallehly_app.ipa
          retention-days: 14