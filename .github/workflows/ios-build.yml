name: Build iOS (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      - name: Disable iOS code signing
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          cd ..

      - name: Build iOS (unsigned)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=1.0.0 \
            --build-number=1

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa_payload/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa_payload/Payload/
          cd build/ios/ipa_payload
          zip -r ../../../sallehly_app.ipa Payload
          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sallehly-ios-ipa
          path: sallehly_app.ipa
          retention-days: 14