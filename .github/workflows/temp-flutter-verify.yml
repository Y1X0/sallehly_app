name: Temporary Flutter Verification (UI branch)

# Temporary, verification-only workflow for reviewing the Premium UI Upgrade
# work on claude/flutter-ui-consistency-vzb65s. Runs flutter --version,
# pub get, analyze, and test only — no build, no signing, no artifacts,
# no merge. Safe to delete once verification is complete.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Test
        run: flutter test
        continue-on-error: true
