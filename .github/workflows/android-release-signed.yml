name: Build Signed Android Release (AAB)

# Manual-only workflow that produces a REAL production-signed Android App
# Bundle (app-release.aab), unlike android-build.yml / temp-build-apk.yml
# which always fall back to debug signing (no secrets involved, safe for
# every push/PR/fork).
#
# Requires four GitHub Secrets (Settings -> Secrets and variables ->
# Actions): ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
# ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD. Full setup instructions in
# android/SIGNING.md.
#
# This workflow never falls back to debug signing: if any required
# secret is missing it fails immediately with a clear error. The
# decoded keystore and the generated android/key.properties exist only
# for the duration of this job, outside the git working tree where
# possible, and are deleted by a cleanup step that always runs (even on
# failure).

on:
  workflow_dispatch:

jobs:
  build-signed-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required secrets are present
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "$ANDROID_KEYSTORE_PASSWORD" ] && missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -z "$ANDROID_KEY_ALIAS" ] && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "$ANDROID_KEY_PASSWORD" ] && missing="$missing ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secret(s):$missing — see android/SIGNING.md for setup instructions. This workflow never falls back to debug signing, so it cannot continue."
            exit 1
          fi
          echo "All required signing secrets are present."

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Generate android/key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=$RUNNER_TEMP/release.jks"
          } > android/key.properties

      - name: Build signed AAB
        run: flutter build appbundle --release

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: sallehly-android-aab-signed
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Clean up signing secrets
        if: always()
        run: |
          rm -f android/key.properties
          rm -f "$RUNNER_TEMP/release.jks"
          echo "Removed temporary keystore and key.properties."
